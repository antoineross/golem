repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-executables-have-shebangs
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: local
    hooks:
      - id: verify-claude-symlink
        name: verify CLAUDE.md symlink
        language: system
        entry: bash -c '[ -L CLAUDE.md ] && [ "$(readlink CLAUDE.md)" = "AGENTS.md" ]'
        pass_filenames: false

      - id: gofmt-check
        name: gofmt check
        language: system
        entry: bash -c 'files=$(find apps -type f -name "*.go" -not -path "*/.git/*" 2>/dev/null); if [ -z "$files" ]; then echo "No Go files found; skipping gofmt check"; exit 0; fi; unformatted=$(echo "$files" | xargs gofmt -l); if [ -n "$unformatted" ]; then echo "The following files need gofmt"; echo "$unformatted"; echo "Run gofmt -w <files>"; exit 1; fi'
        pass_filenames: false

      - id: govet-if-module
        name: go vet when go.mod exists
        language: system
        entry: bash -c 'for mod in apps/*/go.mod; do [ -f "$mod" ] || continue; dir=$(dirname "$mod"); echo "Running go vet in $dir"; (cd "$dir" && go vet ./...) || exit 1; done'
        pass_filenames: false

      - id: gotest-if-module
        name: go test when go.mod exists
        language: system
        entry: bash -c 'for mod in apps/*/go.mod; do [ -f "$mod" ] || continue; dir=$(dirname "$mod"); echo "Running go test in $dir"; (cd "$dir" && go test ./...) || exit 1; done'
        pass_filenames: false

      - id: shellcheck
        name: shellcheck shell scripts
        language: system
        entry: bash -c 'if [ "$#" -eq 0 ]; then exit 0; fi; if ! command -v shellcheck >/dev/null 2>&1; then echo "shellcheck not installed; skipping shell script checks"; exit 0; fi; shellcheck "$@"' --
        types_or: [shell]
