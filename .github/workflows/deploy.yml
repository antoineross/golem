name: Deploy to GCE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      git_sha_short: ${{ steps.vars.outputs.sha }}
      golem_changed: ${{ steps.changes.outputs.golem }}
      observer_changed: ${{ steps.changes.outputs.observer }}
      scraper_changed: ${{ steps.changes.outputs.scraper }}
      demo_target_changed: ${{ steps.changes.outputs.demo_target }}
      any_changed: ${{ steps.changes.outputs.any }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            golem:
              - 'apps/golem/**'
            observer:
              - 'apps/observer/**'
            scraper:
              - 'apps/scraper/**'
            demo_target:
              - 'apps/demo-target/**'
            config:
              - 'docker-compose.yml'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'

      - name: Resolve change flags
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "golem=true" >> "$GITHUB_OUTPUT"
            echo "observer=true" >> "$GITHUB_OUTPUT"
            echo "scraper=true" >> "$GITHUB_OUTPUT"
            echo "demo_target=true" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "golem=${{ steps.filter.outputs.golem }}" >> "$GITHUB_OUTPUT"
            echo "observer=${{ steps.filter.outputs.observer }}" >> "$GITHUB_OUTPUT"
            echo "scraper=${{ steps.filter.outputs.scraper }}" >> "$GITHUB_OUTPUT"
            echo "demo_target=${{ steps.filter.outputs.demo_target }}" >> "$GITHUB_OUTPUT"
            ANY="false"
            if [ "${{ steps.filter.outputs.golem }}" = "true" ] || \
               [ "${{ steps.filter.outputs.observer }}" = "true" ] || \
               [ "${{ steps.filter.outputs.scraper }}" = "true" ] || \
               [ "${{ steps.filter.outputs.demo_target }}" = "true" ] || \
               [ "${{ steps.filter.outputs.config }}" = "true" ]; then
              ANY="true"
            fi
            echo "any=${ANY}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set vars
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  # --- Build jobs (parallel, conditional) ---

  build-golem:
    needs: detect-changes
    if: needs.detect-changes.outputs.golem_changed == 'true'
    uses: ./.github/workflows/build-service.yml
    with:
      service_name: golem
      service_path: ./apps/golem
      image_name: golem-agent
      image_tag: ${{ needs.detect-changes.outputs.git_sha_short }}
    secrets: inherit

  build-observer:
    needs: detect-changes
    if: needs.detect-changes.outputs.observer_changed == 'true'
    uses: ./.github/workflows/build-service.yml
    with:
      service_name: observer
      service_path: ./apps/observer
      image_name: golem-observer
      image_tag: ${{ needs.detect-changes.outputs.git_sha_short }}
    secrets: inherit

  build-scraper:
    needs: detect-changes
    if: needs.detect-changes.outputs.scraper_changed == 'true'
    uses: ./.github/workflows/build-service.yml
    with:
      service_name: scraper
      service_path: ./apps/scraper
      image_name: golem-scraper
      image_tag: ${{ needs.detect-changes.outputs.git_sha_short }}
    secrets: inherit

  build-demo-target:
    needs: detect-changes
    if: needs.detect-changes.outputs.demo_target_changed == 'true'
    uses: ./.github/workflows/build-service.yml
    with:
      service_name: demo-target
      service_path: ./apps/demo-target
      image_name: golem-demo-target
      image_tag: ${{ needs.detect-changes.outputs.git_sha_short }}
    secrets: inherit

  # --- Cleanup jobs (after builds) ---

  cleanup-golem:
    needs: [detect-changes, build-golem]
    if: needs.detect-changes.outputs.golem_changed == 'true'
    uses: ./.github/workflows/cleanup-gar.yml
    with:
      service_name: golem
      image_name: golem-agent
      current_sha_tag: ${{ needs.detect-changes.outputs.git_sha_short }}
    secrets: inherit

  cleanup-observer:
    needs: [detect-changes, build-observer]
    if: needs.detect-changes.outputs.observer_changed == 'true'
    uses: ./.github/workflows/cleanup-gar.yml
    with:
      service_name: observer
      image_name: golem-observer
      current_sha_tag: ${{ needs.detect-changes.outputs.git_sha_short }}
    secrets: inherit

  cleanup-scraper:
    needs: [detect-changes, build-scraper]
    if: needs.detect-changes.outputs.scraper_changed == 'true'
    uses: ./.github/workflows/cleanup-gar.yml
    with:
      service_name: scraper
      image_name: golem-scraper
      current_sha_tag: ${{ needs.detect-changes.outputs.git_sha_short }}
    secrets: inherit

  cleanup-demo-target:
    needs: [detect-changes, build-demo-target]
    if: needs.detect-changes.outputs.demo_target_changed == 'true'
    uses: ./.github/workflows/cleanup-gar.yml
    with:
      service_name: demo-target
      image_name: golem-demo-target
      current_sha_tag: ${{ needs.detect-changes.outputs.git_sha_short }}
    secrets: inherit

  # --- Deploy to VPS ---

  deploy:
    name: Deploy to GCE VM
    needs:
      - detect-changes
      - build-golem
      - build-observer
      - build-scraper
      - build-demo-target
    if: |
      always() &&
      needs.detect-changes.outputs.any_changed == 'true' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure app directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: mkdir -p ~/golem

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/golem/"

      - name: Inject .env.prod on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            cat > ~/golem/.env.prod <<'ENVEOF'
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_LOCATION=${{ secrets.GCP_LOCATION }}
            GCP_REPOSITORY=${{ secrets.GCP_REPOSITORY }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            DEFAULT_LLM_MODEL=gemini-3-flash-preview
            GOLEM_LOG_LEVEL=info
            GOLEM_TIMEOUT_SECONDS=120
            GOLEM_THINKING_LEVEL=medium
            DOMAIN=${{ secrets.DOMAIN }}
            ACME_EMAIL=${{ secrets.ACME_EMAIL }}
            ENVEOF
            sed -i 's/^[[:space:]]*//' ~/golem/.env.prod
            chmod 600 ~/golem/.env.prod

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SHA: ${{ needs.detect-changes.outputs.git_sha_short }}
          GOLEM_CHANGED: ${{ needs.detect-changes.outputs.golem_changed }}
          OBSERVER_CHANGED: ${{ needs.detect-changes.outputs.observer_changed }}
          SCRAPER_CHANGED: ${{ needs.detect-changes.outputs.scraper_changed }}
          DEMO_TARGET_CHANGED: ${{ needs.detect-changes.outputs.demo_target_changed }}
          REGISTRY_URL: "${{ secrets.GCP_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REPOSITORY }}"
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: SHA,GOLEM_CHANGED,OBSERVER_CHANGED,SCRAPER_CHANGED,DEMO_TARGET_CHANGED,REGISTRY_URL
          script: |
            set -e
            cd ~/golem

            export PATH="/snap/bin:$PATH"

            echo "Authenticating Docker with GAR..."
            gcloud auth configure-docker "${{ secrets.GCP_LOCATION }}-docker.pkg.dev" --quiet

            resolve_tag() {
              local svc="$1" changed="$2"
              if [ "$changed" = "true" ]; then
                echo "$SHA"
              else
                local current
                current=$(docker inspect --format='{{.Config.Image}}' "golem-${svc}-1" 2>/dev/null | awk -F: '{print $NF}') || true
                echo "${current:-latest}"
              fi
            }

            export GOLEM_IMAGE="${REGISTRY_URL}/golem-agent:$(resolve_tag golem "$GOLEM_CHANGED")"
            export OBSERVER_IMAGE="${REGISTRY_URL}/golem-observer:$(resolve_tag observer "$OBSERVER_CHANGED")"
            export SCRAPER_IMAGE="${REGISTRY_URL}/golem-scraper:$(resolve_tag scraper "$SCRAPER_CHANGED")"
            export DEMO_TARGET_IMAGE="${REGISTRY_URL}/golem-demo-target:$(resolve_tag demo-target "$DEMO_TARGET_CHANGED")"

            echo "Images: golem=${GOLEM_IMAGE} observer=${OBSERVER_IMAGE} scraper=${SCRAPER_IMAGE} demo-target=${DEMO_TARGET_IMAGE}"

            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans

            echo "Pruning old images..."
            docker image prune -f

            echo "Deploy complete."
            docker compose -f docker-compose.prod.yml --env-file .env.prod ps
