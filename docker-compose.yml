services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  scraper:
    build:
      context: ./apps/scraper
      dockerfile: Dockerfile.dev
    ports:
      - "${SCRAPER_PORT:-8083}:8081"
    environment:
      - REDIS_ADDR=redis:6379
      - HTTP_ADDR=:8081
      - APP_ENV=development
      - LIGHTPANDA_CDP_URL=ws://localhost:9222
    env_file:
      - path: ./apps/scraper/.env.example
        required: true
      - path: .env
        required: false
      - path: .env.local
        required: false
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  demo-target:
    build: ./apps/demo-target
    ports:
      - "${DEMO_TARGET_PORT:-4000}:4000"
    restart: unless-stopped

  golem:
    build:
      context: ./apps/golem
      dockerfile: Dockerfile.dev
    ports:
      - "${GOLEM_PORT:-8081}:8080"
    environment:
      - SUPACRAWL_API_URL=http://scraper:8081
      - REDIS_ADDR=redis:6379
      - GOLEM_TRACE_DIR=/data/tmp/tests
      - DEMO_TARGET_URL=http://demo-target:4000
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
      - path: .env.local
        required: false
    depends_on:
      redis:
        condition: service_healthy
      scraper:
        condition: service_started
    volumes:
      - ./apps/golem:/app
      - golem-go-cache:/go/pkg
      - ./tmp:/data/tmp
    restart: unless-stopped

  observer:
    build: apps/observer
    ports:
      - "3000:3000"
    volumes:
      - ./tmp:/data/tmp
    environment:
      - TRACE_DIR=/data/tmp/tests
      - SCREENSHOT_DIR=/data/tmp/screenshots
      - RUNNER_ENABLED=false
      - GOLEM_API_URL=http://golem:8080
      - DEMO_TARGET_URL=http://demo-target:4000
    depends_on:
      - golem
    restart: unless-stopped

volumes:
  redis-data:
  golem-go-cache:
