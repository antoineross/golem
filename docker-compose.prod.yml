services:
  traefik:
    image: traefik:v3.3
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  scraper:
    image: ${SCRAPER_IMAGE:-golem-scraper:latest}
    environment:
      - REDIS_ADDR=redis:6379
      - HTTP_ADDR=:8081
      - APP_ENV=production
      - DATA_DIR=/data
      - LIGHTPANDA_CDP_URL=ws://localhost:9222
      - GEMINI_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - screenshot-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  demo-target:
    image: ${DEMO_TARGET_IMAGE:-golem-demo-target:latest}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  golem:
    image: ${GOLEM_IMAGE:-golem-agent:latest}
    environment:
      - SUPACRAWL_API_URL=http://scraper:8081
      - REDIS_ADDR=redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_API_KEY_BACKUP=${GOOGLE_API_KEY_BACKUP:-}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-gemini-3-flash-preview}
      - FALLBACK_LLM_MODEL=${FALLBACK_LLM_MODEL:-gemini-3.1-flash-lite-preview}
      - GOLEM_LOG_LEVEL=${GOLEM_LOG_LEVEL:-info}
      - GOLEM_TIMEOUT_SECONDS=${GOLEM_TIMEOUT_SECONDS:-120}
      - GOLEM_THINKING_LEVEL=${GOLEM_THINKING_LEVEL:-medium}
      - GOLEM_TRACE_DIR=/data/traces
      - GOLEM_RETRY_MAX=${GOLEM_RETRY_MAX:-5}
      - GOLEM_RETRY_BASE_DELAY_MS=${GOLEM_RETRY_BASE_DELAY_MS:-2000}
      - GOLEM_RETRY_MAX_DELAY_MS=${GOLEM_RETRY_MAX_DELAY_MS:-30000}
    depends_on:
      redis:
        condition: service_healthy
      scraper:
        condition: service_healthy
    volumes:
      - trace-data:/data/traces
      - screenshot-data:/data/screenshots:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  observer:
    image: ${OBSERVER_IMAGE:-golem-observer:latest}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.observer.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.observer.entrypoints=websecure"
      - "traefik.http.routers.observer.tls.certresolver=letsencrypt"
      - "traefik.http.services.observer.loadbalancer.server.port=3000"
    volumes:
      - trace-data:/observer/traces:ro
      - screenshot-data:/observer/data:ro
    environment:
      - TRACE_DIR=/observer/traces
      - SCREENSHOT_DIR=/observer/data/screenshots
      - SCRAPER_URL=http://scraper:8081
      - GOLEM_API_URL=http://golem:8080
      - RUNNER_ENABLED=false
    depends_on:
      golem:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  redis-data:
  trace-data:
  screenshot-data:
  letsencrypt:
